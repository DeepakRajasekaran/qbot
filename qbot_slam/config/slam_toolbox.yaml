slam_toolbox:
  ros__parameters:

    # Frames
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # Input
    scan_topic: scan

    # Mode
    mode: mapping   # mapping | localization

    # Timing
    transform_timeout: 0.2
    throttle_scans: 1
    map_update_interval: 5.0

    # Laser (Gazebo-perfect lidar)
    minimum_laser_range: 0.05
    maximum_laser_range: 10.0
    max_laser_range: 10.0

    # SLAM behavior
    use_scan_matching: true
    use_imu_data: false   # Gazebo odom is perfect
    enable_interactive_mode: true

    # Loop closure
    loop_closure_enabled: true
    loop_search_maximum_distance: 5.0

    # Map
    resolution: 0.05

    # Performance
    stack_size_to_use: 40000000

    # QoS (important for Gazebo)
    qos_overrides:
      /scan:
        subscription:
          reliability: best_effort
          durability: volatile
